# .github/workflows/test.yml

name: CI
on: push

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        # Docker Hub image
        image: postgres:17
        # Provide the password for postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: habitos_test
        # Test Port for postgres
        ports: 
          - 5432:5432
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Downloads a copy of the code in your repository before running CI tests
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.13'
          cache: 'pip'

      # Performs a clean installation of all dependencies in the `package.json` file
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        env: 
          DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/habitos_test
          SECRET_KEY: test-secret-for-ci-only
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/habitos_test
        run: pytest -v
